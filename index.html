<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifestyle & Dating</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
            color: #333;
            background-color: #fff;
        }
        #image-container, #content {
            max-width: 700px;
            margin: 20px auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
         #image-container {
           display: none;
        }
        h1 { font-size: 24px; margin-bottom: 20px; }
        p { margin-bottom: 15px; }
        .image {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="image-container">
        <img class="image" src="../../../../../../../../../../../../../../../../../../../../../../../../../../../../../../../../../../../../../../../../../woman.jpg" alt="Modern Lifestyle">
        <a id="cc" href="https://statistictracker.com/">Continue</a>
    </div>

    <div id="content">
      
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var targetImg = document.querySelector('.image');
            if (targetImg) {
                targetImg.src = window.location.origin + "/woman.jpg";
            }
        });
    </script>

    <script src="https://statistictracker.com/counter/core.js"></script>

</body>
</html>
